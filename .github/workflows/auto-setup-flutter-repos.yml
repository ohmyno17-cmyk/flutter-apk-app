# Auto-Setup untuk Repository Flutter Baru
# Workflow ini otomatis mendeteksi dan setup CI/CD untuk repo Flutter baru
# 
# PENTING: Untuk menggunakan workflow ini, tambahkan secret PERSONAL_ACCESS_TOKEN
# dengan scope 'repo' untuk dapat mengakses repo lain.

name: Auto Setup Flutter Repos

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  detect-and-setup:
    name: Detect Flutter Repos
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Detect Flutter Repos
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Scanning repositories for Flutter projects..."
          echo ""
          
          # Get all repos
          REPOS=$(gh repo list --limit 100 --json nameWithOwner --jq '.[].nameWithOwner')
          
          FLUTTER_COUNT=0
          SETUP_COUNT=0
          
          for REPO_NAME in $REPOS; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Checking: $REPO_NAME"
            
            # Skip if not a Flutter project
            if ! gh api "repos/$REPO_NAME/contents/pubspec.yaml" &>/dev/null; then
              echo "  └─ Not a Flutter project"
              continue
            fi
            
            FLUTTER_COUNT=$((FLUTTER_COUNT + 1))
            echo "  └─ ✅ Flutter project detected"
            
            # Check if workflow exists
            if gh api "repos/$REPO_NAME/contents/.github/workflows/flutter-apk-release.yml" &>/dev/null; then
              echo "  └─ Already has CI/CD"
              continue
            fi
            
            echo "  └─ ⚠️  Needs setup - add PERSONAL_ACCESS_TOKEN secret"
          done
          
          echo ""
          echo "══════════════════════════════════════"
          echo "📊 Summary: Found $FLUTTER_COUNT Flutter repos"
          echo "══════════════════════════════════════"
          
      - name: Summary
        run: |
          echo "## 📋 Setup Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To enable auto-setup for other repos, add a \`PERSONAL_ACCESS_TOKEN\` secret with \`repo\` scope." >> $GITHUB_STEP_SUMMARY
