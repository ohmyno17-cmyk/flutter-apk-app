# Reusable Workflow untuk Flutter APK Build
# File ini dipanggil dari repository Flutter manapun
# Tidak perlu copy workflow ke setiap repo!

name: Flutter APK Builder (Reusable)

on:
  workflow_call:
    inputs:
      flutter-version:
        description: 'Flutter version'
        required: false
        default: '3.24.0'
        type: string
      build-type:
        description: 'Build type (release/debug/profile)'
        required: false
        default: 'release'
        type: string
      java-version:
        description: 'Java version'
        required: false
        default: '17'
        type: string
      split-per-abi:
        description: 'Split APK per ABI (smaller size)'
        required: false
        default: 'false'
        type: string
    secrets:
      KEYSTORE_BASE64:
        required: false
      KEYSTORE_PASSWORD:
        required: false
      KEY_ALIAS:
        required: false
      KEY_PASSWORD:
        required: false
    outputs:
      apk-name:
        description: 'Generated APK filename'
        value: ${{ jobs.build.outputs.apk_name }}

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    outputs:
      apk_name: ${{ steps.prepare.outputs.apk_name }}
      version: ${{ steps.prepare.outputs.version }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Get Dependencies
        run: flutter pub get

      - name: Analyze Code
        run: flutter analyze --no-fatal-infos || true

      - name: Setup Signing for Release Build
        if: inputs.build-type == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Check if secrets are available
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ]; then
            echo "Setting up signing..."
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            
            cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF
            
            echo "HAS_SIGNING=true" >> $GITHUB_ENV
          else
            echo "No signing secrets found, will use debug signing"
            echo "HAS_SIGNING=false" >> $GITHUB_ENV
          fi

      - name: Build APK
        run: |
          BUILD_TYPE="${{ inputs.build-type }}"
          SPLIT_PER_ABI="${{ inputs.split-per-abi }}"
          
          FLAGS="--${BUILD_TYPE}"
          if [ "$SPLIT_PER_ABI" = "true" ]; then
            FLAGS="$FLAGS --split-per-abi"
          fi
          
          flutter build apk $FLAGS

      - name: Build App Bundle
        if: inputs.build-type == 'release'
        run: flutter build appbundle --release || true

      - name: Prepare Artifacts
        id: prepare
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 || echo "1.0.0")
          BUILD_TYPE="${{ inputs.build-type }}"
          
          mkdir -p output
          
          # Find and copy APK
          APK_DIR="build/app/outputs/flutter-apk"
          if [ -d "$APK_DIR" ]; then
            for apk in "$APK_DIR"/*.apk; do
              if [ -f "$apk" ]; then
                filename=$(basename "$apk")
                cp "$apk" "output/${filename}"
              fi
            done
          fi
          
          # Copy AAB if exists
          if [ -f "build/app/outputs/bundle/release/app-release.aab" ]; then
            cp build/app/outputs/bundle/release/app-release.aab "output/app-${VERSION}.aab"
          fi
          
          echo "apk_name=app-${VERSION}-${BUILD_TYPE}.apk" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-${{ inputs.build-type }}
          path: output/*.apk
          retention-days: 30

      - name: Upload AAB Artifact
        if: inputs.build-type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-aab
          path: output/*.aab
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          rm -f android/app/keystore.jks 2>/dev/null || true
          rm -f android/key.properties 2>/dev/null || true
