# GitHub Actions Workflow untuk Flutter APK Release
# File ini akan otomatis build APK setiap ada push tag atau manual trigger

name: Flutter APK Release

on:
  # Trigger manual dari GitHub Actions tab
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipe build APK'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
          - profile

  # Trigger otomatis saat push tag dengan format v*
  push:
    tags:
      - 'v*'

  # Trigger saat pull request (untuk testing)
  pull_request:
    branches:
      - main
      - master

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout kode
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup Java JDK
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      # Step 3: Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      # Step 4: Cache Gradle dependencies
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Step 5: Get Flutter dependencies
      - name: Get Dependencies
        run: flutter pub get

      # Step 6: Analyze code
      - name: Analyze Code
        run: flutter analyze --no-fatal-infos || true

      # Step 7: Decode keystore dari secrets (untuk release build)
      - name: Decode Keystore
        if: (github.event.inputs.build_type == 'release' || github.event.inputs.build_type == '') && hashFiles('**/key.properties') == ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            echo "Keystore decoded successfully"
          else
            echo "No keystore secret found, will use debug signing"
          fi

      # Step 8: Create key.properties file
      - name: Create key.properties
        if: (github.event.inputs.build_type == 'release' || github.event.inputs.build_type == '') && hashFiles('**/key.properties') == ''
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_PASSWORD" ]; then
            cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF
            echo "key.properties created successfully"
          else
            echo "No keystore secrets found, will use debug signing"
          fi

      # Step 9: Build APK
      - name: Build APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          
          if [ "$BUILD_TYPE" = "release" ]; then
            flutter build apk --release
          elif [ "$BUILD_TYPE" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --profile
          fi

      # Step 10: Build App Bundle (AAB) untuk Google Play
      - name: Build App Bundle
        if: github.event.inputs.build_type == 'release' || github.event.inputs.build_type == '' || startsWith(github.ref, 'refs/tags/')
        run: flutter build appbundle --release || true

      # Step 11: Rename dan prepare artifacts
      - name: Prepare Artifacts
        id: prepare
        run: |
          # Get version from pubspec.yaml
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          
          # Create output directory
          mkdir -p output
          
          # Copy APK
          if [ "$BUILD_TYPE" = "release" ]; then
            APK_FILE="build/app/outputs/flutter-apk/app-release.apk"
          elif [ "$BUILD_TYPE" = "debug" ]; then
            APK_FILE="build/app/outputs/flutter-apk/app-debug.apk"
          else
            APK_FILE="build/app/outputs/flutter-apk/app-profile.apk"
          fi
          
          if [ -f "$APK_FILE" ]; then
            cp "$APK_FILE" "output/app-${VERSION}-${BUILD_TYPE}.apk"
            echo "apk_file=app-${VERSION}-${BUILD_TYPE}.apk" >> $GITHUB_OUTPUT
          fi
          
          # Copy AAB if exists
          if [ -f "build/app/outputs/bundle/release/app-release.aab" ]; then
            cp build/app/outputs/bundle/release/app-release.aab "output/app-${VERSION}.aab"
            echo "aab_file=app-${VERSION}.aab" >> $GITHUB_OUTPUT
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT

      # Step 12: Upload APK sebagai artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-${{ steps.prepare.outputs.build_type }}
          path: output/*.apk
          retention-days: 30

      # Step 13: Upload AAB sebagai artifact
      - name: Upload AAB Artifact
        if: steps.prepare.outputs.aab_file != ''
        uses: actions/upload-artifact@v4
        with:
          name: flutter-aab
          path: output/*.aab
          retention-days: 30

      # Step 14: Create GitHub Release (hanya untuk tag)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/*.apk
            output/*.aab
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 15: Cleanup sensitive files
      - name: Cleanup
        if: always()
        run: |
          rm -f android/app/keystore.jks 2>/dev/null || true
          rm -f android/key.properties 2>/dev/null || true
