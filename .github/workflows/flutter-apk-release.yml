# Workflow utama untuk Flutter APK Release
# Menggunakan reusable workflow dari repo yang sama

name: Flutter APK Release

on:
  # Manual trigger dari Actions tab
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipe build APK'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
          - profile
      split_per_abi:
        description: 'Split APK per ABI (ukuran lebih kecil)'
        required: false
        default: false
        type: boolean

  # Auto trigger saat push tag dengan format v*
  push:
    tags:
      - 'v*'

  # Trigger saat pull request (untuk testing)
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK
    uses: ./.github/workflows/flutter-apk-builder.yml
    with:
      flutter-version: '3.24.0'
      build-type: ${{ github.event.inputs.build_type || 'release' }}
      split-per-abi: ${{ github.event.inputs.split_per_abi == 'true' && 'true' || 'false' }}
    secrets: inherit

  # Optional: Create GitHub Release
  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: flutter-apk-release
          path: ./artifacts

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: flutter-aab
          path: ./artifacts
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.apk
            ./artifacts/*.aab
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
